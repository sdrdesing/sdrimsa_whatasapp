services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: sdrimsacbot-app
    restart: always
    env_file:
      - .env.production
    volumes:
      - /var/www/sdrimsacbot:/var/www
      - /var/www/sdrimsacbot/storage:/var/www/storage
    depends_on:
      - mysql
      - redis
    networks:
      - appnet
    environment:
      - PHP_MEMORY_LIMIT=512M
      - PHP_MAX_EXECUTION_TIME=300

  nginx:
    image: nginx:alpine
    container_name: sdrimsacbot-nginx
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - /var/www/sdrimsacbot:/var/www
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf
      # SSL será configurado cuando tengas certificados de Let's Encrypt
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - appnet
    environment:
      - NGINX_HOST=sdrimsac.xyz
      - NGINX_PORT=80

  mysql:
    image: mariadb:10.6
    container_name: sdrimsacbot-mysql
    restart: always
    environment:
      MYSQL_DATABASE: sdrimsacbot
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sdrimsac
      MYSQL_PASSWORD: Sdrimsac@2025!
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - appnet
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:alpine
    container_name: sdrimsacbot-redis
    restart: always
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - appnet
    command: redis-server --appendonly yes

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: sdrimsacbot-scheduler
    restart: always
    env_file:
      - .env.production
    volumes:
      - /var/www/sdrimsacbot:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - appnet
    command: php /var/www/artisan schedule:work

volumes:
  mysql_data:
  redis_data:

networks:
  appnet:
    driver: bridge
