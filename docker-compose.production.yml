version: "3.8"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: sdrimsacbot-app
    restart: always
    env_file:
      - .env.production
    volumes:
      - ./.env.production:/var/www/.env
      - ./storage:/var/www/storage
    depends_on:
      - mysql
      - redis
    networks:
      - appnet
    environment:
      PHP_MEMORY_LIMIT: 512M
      PHP_MAX_EXECUTION_TIME: 300

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: sdrimsacbot-scheduler
    restart: always
    env_file:
      - .env.production
    volumes:
      - ./storage:/var/www/storage
    depends_on:
      - mysql
      - redis
    networks:
      - appnet
    command: php /var/www/artisan schedule:work

  nginx:
    image: nginx:alpine
    container_name: sdrimsacbot-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/www/sdrimsacbot:/var/www
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - baileys
    networks:
      - appnet

  mysql:
    image: mariadb:10.6
    container_name: sdrimsacbot-mysql
    restart: always
    environment:
      MYSQL_DATABASE: sdrimsacbot
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sdrimsac
      MYSQL_PASSWORD: Sdrimsac@2026!
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - appnet

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - appnet
    command: redis-server --appendonly yes

  baileys:
    image: node:20-alpine
    container_name: baileys-bot-prod
    restart: always
    working_dir: /app
    volumes:
      - /var/www/sdrimsacbot/baileys-bot:/app
    depends_on:
      - redis
    networks:
      - appnet
    command: sh -c "npm install --production && npm start"
    environment:
      NODE_ENV: production

volumes:
  mysql_data:
  redis_data:

networks:
  appnet:
    driver: bridge
