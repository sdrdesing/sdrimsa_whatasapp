services:
  app:
    build: .
    container_name: laravel_app
    env_file:
      - .env
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: sdrimsacbot-nginx
    ports:
      - "8090:80"
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - app
      - node
    networks:
      - appnet

  mysql:
    image: mariadb:10.6
    container_name: sdrimsacbot-mysql
    environment:
      MYSQL_DATABASE: sdrimsacbot
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sdrimsac
      MYSQL_PASSWORD: "Sdrimsac@2026!"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - appnet

  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - appnet

  node:
    image: node:20-alpine
    container_name: laravel_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run build"
    depends_on:
      - app
    networks:
      - appnet

  queue:
    build: .
    container_name: sdrimsacbot-queue
    command: php artisan queue:work --sleep=3 --tries=3
    env_file:
      - .env
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  mysql_data:
