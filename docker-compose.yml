services:
  app:
    build: .
    container_name: sdrimsacbot-app
    env_file:
      - .env
    volumes:
      - .:/var/www
    working_dir: /var/www
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet
    entrypoint: sh -c "composer install --no-dev && php-fpm"

  nginx:
    image: nginx:alpine
    container_name: sdrimsacbot-nginx
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www
    depends_on:
      app:
        condition: service_healthy
      node:
        condition: service_started
      baileys:
        condition: service_started
    networks:
      - appnet

  postgres:
    image: postgres:15-alpine
    container_name: sdrimsacbot-postgres
    environment:
      POSTGRES_DB: sdrimsacbot
      POSTGRES_USER: sdrimsac
      POSTGRES_PASSWORD: "Sdrimsac@2026!"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appnet

  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - appnet

  node:
    image: node:20-alpine
    container_name: laravel_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - app
    networks:
      - appnet

  baileys:
    build: 
      context: ./baileys-bot
      dockerfile: Dockerfile
    container_name: baileys-bot
    working_dir: /usr/src/app
    volumes:
      - ./baileys-bot/session:/usr/src/app/session
      - ./baileys-bot/uploads:/usr/src/app/uploads
    depends_on:
      - redis
    networks:
      - appnet

  queue:
    build: .
    container_name: sdrimsacbot-queue
    command: php artisan queue:work --sleep=3 --tries=3
    env_file:
      - .env
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  postgres_data: