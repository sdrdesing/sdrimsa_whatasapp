services:
  app:
    build: .
    container_name: sdrimsacbot-app
    env_file:
      - .env
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet
    entrypoint: sh -c "composer install --no-dev && php-fpm"

  nginx:
    image: nginx:alpine
    container_name: sdrimsacbot-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www
    depends_on:
      app:
        condition: service_healthy
      node:
        condition: service_started
      baileys:
        condition: service_started
    networks:
      - appnet

  mysql:
    image: mariadb:10.6
    container_name: sdrimsacbot-mysql
    environment:
      MYSQL_DATABASE: sdrimsacbot
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sdrimsac
      MYSQL_PASSWORD: "Sdrimsac@2026!"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - appnet

  redis:
    image: redis:alpine
    container_name: redis
    networks:
      - appnet

  node:
    image: node:20-alpine
    container_name: laravel_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - app
    networks:
      - appnet

  baileys:
    image: node:20-alpine
    container_name: baileys-bot
    working_dir: /var/www/baileys-bot
    volumes:
      - ./baileys-bot:/var/www/baileys-bot
    command: sh -c "apk add --no-cache git openssh && npm install && npm start"
    depends_on:
      - redis
    networks:
      - appnet

  queue:
    build: .
    container_name: sdrimsacbot-queue
    command: php artisan queue:work --sleep=3 --tries=3
    env_file:
      - .env
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  mysql_data: