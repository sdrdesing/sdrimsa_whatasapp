# ===========================
# HTTP: redirige todo a HTTPS
# ===========================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name sdrimsac.xyz www.sdrimsac.xyz *.sdrimsac.xyz;

    # Redirigir todo a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===========================
# HTTPS: sdrimsac.xyz y subdominios (Certificado ÚNICO)
# ===========================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name sdrimsac.xyz www.sdrimsac.xyz *.sdrimsac.xyz;

    # SSL Certificados (Let's Encrypt) - SDRIMSAC.XYZ SOLAMENTE
    ssl_certificate /etc/letsencrypt/live/sdrimsac.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sdrimsac.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Laravel root
    root /var/www/public;
    index index.php index.html index.htm;
    charset utf-8;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    client_max_body_size 100M;

    # Archivos estáticos cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon y robots
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Denegar archivos ocultos y configs
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~ /(composer.json|composer.lock|package.json|package-lock.json|\.env)$ { deny all; }
    location ~ /storage/|/vendor/ { deny all; }

    # PHP
    location ~ \.php$ {
        fastcgi_pass sdrimsacbot-app:9000;   # <- nombre del contenedor Laravel
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_connect_timeout 300s;
        fastcgi_send_timeout 600s;
        fastcgi_read_timeout 600s;
        fastcgi_hide_header X-Powered-By;
    }

    # WebSocket / Socket.Io

    # Laravel rewrite
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
