upstream baileys_backend {
    server baileys-bot:3000;
}

server {
    listen 80;
    
    # Configuración para IP Real (Proxy Inverso)
    set_real_ip_from  127.0.0.1;
    set_real_ip_from  172.16.0.0/12; # Red interna de Docker
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    index index.php index.html;
    root /var/www/public;

    server_name _; # Puedes reemplazarlo con tu dominio si quieres

    # Socket.IO - Proxy WebSocket
    location /socket.io {
        proxy_pass http://baileys_backend/socket.io;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Página principal
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass sdrimsacbot-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Proteger archivos .ht*
    location ~ /\.ht {
        deny all;
    }

    # Opcional: cache de assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
    }
}