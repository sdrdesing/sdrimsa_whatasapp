# Configuración de Nginx para Desarrollo con Docker Compose
# Este archivo se usa cuando desarrollas localmente con docker-compose.yml

upstream fastcgi_backend {
    server app:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost *.localhost sdrimsacbot.local *.sdrimsacbot.local;

    root /var/www/public;
    index index.php index.html index.htm;

    # Desactivar gzip en desarrollo para mejor debugging
    gzip off;

    # Logs en desarrollo
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Evitar timeout en desarrollo
    fastcgi_read_timeout 300s;
    fastcgi_connect_timeout 300s;

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny access to laravel config files
    location ~ /config\.php$ {
        deny all;
    }

    # Route to Laravel app
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP Configuration
    location ~ \.php$ {
        fastcgi_pass sdrimsacbot-app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_max_temp_file_size 0;
        fastcgi_temp_file_write_size 256k;

        # Add XDebug headers for development debugging
        fastcgi_param PHP_VALUE "xdebug.mode=develop";
    }

    # Deny access to .env and other sensitive files
    location ~ /\.(env|git)/ {
        deny all;
    }
}
